# prometheus.yml - Main config for Prometheus
# Docs: https://prometheus.io/docs/prometheus/latest/configuration/configuration/

# These settings apply to every scrape job unless overridden
global:
  # How often Prometheus pulls metrics from each target
  # 15s is the industry standard — fast enough to catch issues,
  # not so fast it hammers your servers
  scrape_interval: 15s

  # How often Prometheus evaluates alert rules
  # Same as scrape_interval — no point checking rules
  # faster than new data comes in
  evaluation_interval: 15s

# Tell Prometheus where Alertmanager runs
# Same container, so localhost works
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'

# Alert rules file — Prometheus checks these every evaluation_interval
rule_files:
  - "/etc/prometheus/alert_rules.yml"

# The core config — defines WHAT to scrape and WHERE
scrape_configs:

  # Prometheus monitors itself — useful to check its own health
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # All three Proxmox hosts via node_exporter on port 9100
  # node_exporter reads CPU, RAM, disk, network from the kernel
  - job_name: 'proxmox-nodes'
    static_configs:
      - targets:
          - '192.168.1.249:9100'   # pve — main node with ZFS storage
          - '192.168.1.211:9100'   # node2 — runs most services
          - '192.168.1.74:9100'    # node3
        labels:
          # Custom label for filtering in PromQL queries
          # e.g. up{group="proxmox"} returns only proxmox hosts
          group: 'proxmox'

  # HTTP service checks via blackbox_exporter
  # Makes real HTTP requests and checks if the response is valid
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]    # Defined in blackbox.yml — expects status 200/301/302
    static_configs:
      - targets:
          # Every URL here gets checked each scrape_interval (15s)
          - 'https://192.168.1.118:8000'   # Vaultwarden (HTTPS)
          - 'http://192.168.1.30:81'       # Nginx Proxy Manager
          - 'http://192.168.1.223/admin'   # Pi-hole
          - 'http://localhost:3000'         # Grafana (same CT)
          - 'http://192.168.1.250:8000'    # Paperless-ngx
          - 'http://192.168.1.96:8080'     # Glance
    # Relabeling — rewrites the scrape request to go through blackbox_exporter
    # Instead of scraping the target directly, we tell blackbox_exporter
    # "check this URL for me" and report back the result
    #   1. Original URL becomes the ?target= parameter
    #   2. URL stays as the "instance" label (shows up in dashboards/alerts)
    #   3. Actual scrape goes to blackbox_exporter on localhost:9115
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  # ICMP ping checks — are hosts reachable at network level?
  # Catches network-level issues that HTTP checks might miss
  - job_name: 'blackbox-ping'
    metrics_path: /probe
    params:
      module: [icmp_ping]
    static_configs:
      - targets:
          - '192.168.1.249'    # pve
          - '192.168.1.211'    # node2
          - '192.168.1.74'     # node3
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115
