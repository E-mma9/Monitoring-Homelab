# blackbox.yml - Defines probe modules for blackbox_exporter
#
# Each module is a type of check that Prometheus can request
# via the /probe endpoint. The module name is passed as a parameter
# in the Prometheus scrape config.
#


modules:
  # HTTP check - verifies a URL returns a valid response
  # Used for checking if web services (Grafana, Vaultwarden, etc.) are up
  http_2xx:
    prober: http
    timeout: 5s    # Give up after 8 seconds - anything slower is broken
    http:
      # Accept both HTTP/1.1 and HTTP/2
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      # Consider these status codes as "success"
      # 200 = OK, 301/302 = redirect (still means the server is alive)
      valid_status_codes: [200, 301, 302]
      # Follow redirects - some services redirect /admin to /admin/login etc.
      follow_redirects: true

  # TCP check - just tries to open a TCP connection on a port
  # Useful for non-HTTP services like databases or custom apps
  tcp_connect:
    prober: tcp
    timeout: 5s

 
