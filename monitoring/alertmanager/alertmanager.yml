# alertmanager.yml - Controls how alerts get routed and delivered
#
# Flow: Prometheus fires alert → Alertmanager receives it →
#       groups related alerts → waits briefly for more →
#       sends to PagerDuty → phone/SMS/email notification
#
# Docs: https://prometheus.io/docs/alerting/latest/configuration/

global:
  # After an alert stops firing, wait this long before sending "resolved"
  # Prevents flapping (firing → resolved → firing → resolved = notification spam)
  resolve_timeout: 1m

  # PagerDuty Events API endpoint — don't change this
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

# Routing tree — decides which alerts go where
route:
  # Default receiver — all alerts go to PagerDuty
  receiver: 'pagerduty'

  # Group alerts with the same name together
  # If all 3 nodes trigger DiskSpaceWarning at once, you get ONE incident
  # listing all 3, not 3 separate incidents
  group_by: ['alertname']

  # After the first alert in a group, wait 30 seconds to see if
  # more alerts from the same group come in before sending
  group_wait: 30s

  # Once a grouped notification is sent, wait 5 minutes before
  # sending another for the same group
  group_interval: 5m

  # If the same alert is still firing after 4 hours, remind again
  repeat_interval: 4h

# Where alerts get delivered
receivers:
  - name: 'pagerduty'
    pagerduty_configs:
        # Integration key from PagerDuty service configuration
        # Get this from: PagerDuty → Services → Your Service → Integrations
      - routing_key: 'YOUR_PAGERDUTY_INTEGRATION_KEY'

        # Map alert severity to PagerDuty severity levels
        severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'

        # Alert description shown in the PagerDuty incident
        description: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

        # Also send a notification when the problem is fixed
        send_resolved: true
